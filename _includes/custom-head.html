<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

<style>
  :root {
    --c-bg: #ffffff;
    --c-surface: #f9fafb;
    --c-border: #e5e7eb;
    --c-text: #111827;
    --c-muted: #6b7280;
    --c-accent: #1d4ed8;
    --c-accent-soft: #eff6ff;
    --c-code-fg: #b91c1c;
    --c-code-bg: #f3f4f6;
    --radius: 6px;
    --max-w: 760px;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font);
    font-size: 1rem;
    line-height: 1.75;
    color: var(--c-text);
    background: var(--c-bg);
    -webkit-font-smoothing: antialiased;
    margin: 0;
  }

  /* ── Header ── */
  .site-header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-top: none !important;
    border-bottom: 1px solid var(--c-border);
    padding: 0;
    min-height: 0;
  }

  .site-header > .wrapper {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: var(--max-w);
    padding: 0 1.5rem;
    height: 56px;
    margin: 0 auto;
    float: none;
  }

  .site-title,
  .site-title:visited {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--c-text) !important;
    text-decoration: none !important;
    letter-spacing: -0.015em;
  }
  .site-title:hover { color: var(--c-accent) !important; }

  .site-nav {
    background: none;
    border: none;
    padding: 0;
    float: none;
    line-height: 1;
  }
  .site-nav .page-link {
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--c-muted);
    text-decoration: none;
    margin-left: 0;
    padding: 0;
  }
  .site-nav .page-link:hover { color: var(--c-text); }
  .site-nav .menu-icon { display: none !important; }
  .site-nav .trigger { display: block !important; position: static; border: none; background: none; padding: 0; }

  /* ── Layout ── */
  .wrapper {
    max-width: var(--max-w);
    margin-left: auto;
    margin-right: auto;
    padding-left: 1.5rem;
    padding-right: 1.5rem;
  }

  .page-content {
    padding: 3.5rem 0 4.5rem;
    min-height: calc(100vh - 56px - 72px);
  }

  /* ── Typography ── */
  h1, h2, h3, h4, h5, h6 {
    font-family: var(--font);
    font-weight: 700;
    line-height: 1.25;
    letter-spacing: -0.025em;
    color: var(--c-text);
    margin-top: 2.5rem;
    margin-bottom: 0.75rem;
  }

  h1 {
    font-size: 1.875rem;
    margin-top: 0;
    padding-bottom: 0.875rem;
    border-bottom: 2px solid var(--c-border);
    margin-bottom: 1.75rem;
  }

  h2 {
    font-size: 1.3rem;
    padding-bottom: 0.375rem;
    border-bottom: 1.5px solid var(--c-border);
  }

  h3 { font-size: 1.075rem; }

  p { margin-top: 0; margin-bottom: 1.25rem; }

  a { color: var(--c-accent); }
  a:hover { text-decoration: underline; }

  ul, ol {
    padding-left: 1.5rem;
    margin-top: 0;
    margin-bottom: 1.25rem;
  }
  li { margin-bottom: 0.375rem; }
  li:last-child { margin-bottom: 0; }

  /* ── Inline code ── */
  code {
    font-family: var(--mono);
    font-size: 0.8125em;
    background: var(--c-code-bg);
    border: 1px solid var(--c-border);
    border-radius: 3px;
    padding: 0.1em 0.38em;
    color: var(--c-code-fg);
  }

  pre {
    background: var(--c-code-bg);
    border: 1px solid var(--c-border);
    border-radius: var(--radius);
    padding: 1.25rem;
    overflow-x: auto;
    margin: 0 0 1.5rem;
  }
  pre code {
    background: none;
    border: none;
    padding: 0;
    color: var(--c-text);
    font-size: 0.875rem;
  }

  /* ── Images ── */
  img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 2rem auto;
    border-radius: var(--radius);
    border: 1px solid var(--c-border);
    box-shadow: 0 2px 16px rgba(0, 0, 0, 0.07);
  }

  /* broken image fallback */
  img::after {
    content: attr(alt);
    display: block;
    background: var(--c-surface);
    border: 1px dashed var(--c-border);
    border-radius: var(--radius);
    padding: 2rem 1.5rem;
    color: var(--c-muted);
    font-size: 0.875rem;
    text-align: center;
  }

  /* ── Blockquote ── */
  blockquote {
    border-left: 3px solid var(--c-accent);
    margin: 1.5rem 0;
    padding: 0.25rem 1.25rem;
    color: var(--c-muted);
    font-style: italic;
  }

  /* ── Footer ── */
  .site-footer {
    background: var(--c-surface);
    border-top: 1px solid var(--c-border);
    padding: 1.25rem 0;
    font-size: 0.8125rem;
    color: var(--c-muted);
  }

  .site-footer .wrapper {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .site-footer .footer-col-wrapper {
    display: flex;
    gap: 2rem;
    width: 100%;
  }

  .site-footer .footer-col { padding: 0; }

  .site-footer .contact-list,
  .site-footer .social-media-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .site-footer a,
  .site-footer a:visited {
    color: var(--c-muted);
    text-decoration: none;
  }
  .site-footer a:hover { color: var(--c-text); }

  .site-footer p { margin: 0; color: var(--c-muted); }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    h1 { font-size: 1.5rem; }
    h2 { font-size: 1.15rem; }
    .page-content { padding: 2rem 0 3rem; }
    .site-footer .wrapper { flex-direction: column; gap: 0.5rem; }
  }
</style>
